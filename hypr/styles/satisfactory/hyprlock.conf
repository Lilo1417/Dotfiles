

background {
    monitor =
    path= $HOME/.config/hypr/background.jpg
    color = rgba(255, 100, 0, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(43, 48, 59, 0)
 
    outer_color = rgba(0, 0, 0, 1) 
    check_color = rgba(255, 119, 0, 1)
    fail_color = rgba(255, 80, 0, 1)


    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = GohuFont 14 Nerd Font
    placeholder_text = Pioneer Authentication
    fail_text = 
    rounding = 5
    dot_size = 0.2

    halign = center
    valign = center
}

label {
        text = Keyboard: $LAYOUT
        font_family = GohuFont 14 Nerd Font 
        position = 0, 60
    }
label {
        text = $FAIL
        color = rgba(255, 255, 255, 1)
        font_family = GohuFont 14 Nerd Font
        position = 0, -60
    }

