

background {
    monitor =
    path= $HOME/.config/hypr/backgrounds/DarthVaderWallpaper.jpg
    color = rgba(255, 100, 0, 1.0)
    blur_passes = 2
}
label {
        text = $TIME
        font_size = 150
        position = 0, 250
        color = rgba(255, 255, 50, 1)
        font_family = Star Jedi Hollow
        

    }
input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(43, 48, 59, 0)
    outer_color = rgba(43, 48, 59, 1) 
    check_color = rgba(255, 119, 0, 1)
    fail_color = rgba(255, 80, 0, 1)

    position = 0, -50
    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = GohuFont 14 Nerd Font
    placeholder_text = Enter Password
    fail_text = 
    rounding = 5
    dot_size = 0.2

    halign = center
    valign = center
}

label {
        text = Keyboard: $LAYOUT
        font_family = GohuFont 14 Nerd Font 
        position = 0, 10
    }
label {
        text = $FAIL
        color = rgba(255, 255, 255, 1)
        font_family = GohuFont 14 Nerd Font
        position = 0, -110
    }

